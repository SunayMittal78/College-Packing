<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packing Planner - Live Sync</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

:root{
  --bg:#EFF2F0;
  --card:#FFFFFF;
  --ink:#252A28;
  --muted:#828F8A;
  --line:#E1E6E3;
  --teal:#1F5E54;
  --teal-soft:#E3EFEC;
  --amber:#D99A33;
  --amber-soft:#FBF1DE;
  --red:#C0463C;
  --radius:16px;
  --font-display:'Space Grotesk', system-ui, sans-serif;
  --font-body:'Inter', system-ui, sans-serif;
  --font-mono:'IBM Plex Mono', monospace;

  /* label color palette, cycled through for each label */
  --l0:#1F5E54;
  --l1:#C77B2E;
  --l2:#5E9C7A;
  --l3:#5C7AA8;
  --l4:#B5654A;
  --l5:#8868A6;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  padding:28px 20px 60px;
  -webkit-font-smoothing:antialiased;
}

button:focus-visible, input:focus-visible, select:focus-visible, [contenteditable]:focus-visible{
  outline:2px solid var(--teal);
  outline-offset:2px;
}

/* Top bar */
.topbar{
  max-width:1100px;
  margin:0 auto 24px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  flex-wrap:wrap;
}
.topbar h1{
  font-family:var(--font-display);
  font-size:28px;
  margin:0;
  letter-spacing:-0.02em;
}
.topbar p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
  max-width:56ch;
}
.topbar-actions{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.room-badge {
  font-family:var(--font-mono);
  font-size: 12px;
  background: var(--teal-soft);
  color: var(--teal);
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: bold;
}
.btn{
  font-family:var(--font-body);
  font-size:13px;
  font-weight:600;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  padding:9px 16px;
  border-radius:10px;
  cursor:pointer;
  transition:border-color .15s, color .15s;
}
.btn:hover{ border-color:var(--teal); color:var(--teal); }

/* shared page sections */
.page{
  max-width:1100px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:0 1px 3px rgba(20,30,28,0.04);
}
.card::before{
  content:'';
  position:absolute;
  top:-9px; left:26px;
  width:16px; height:16px;
  border-radius:50%;
  background:var(--bg);
  border:1px solid var(--line);
}
.card.accent-amber{ border-top:4px solid var(--amber); }
.card.accent-teal{ border-top:4px solid var(--teal); }

/* Top Add New Item Form */
.add-item-card-row {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.add-item-input {
  flex: 1;
  min-width: 260px;
  border: 1px solid var(--line);
  background: #fff;
  font-family: var(--font-body);
  font-size: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  outline: none;
}
.add-item-input:focus {
  border-color: var(--teal);
}
.add-item-labels-title {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 14px;
  margin-bottom: 8px;
}
.add-item-labels-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.add-chip-toggle {
  display: flex;
  align-items: center;
  gap: 4px;
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--muted);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.add-chip-toggle.active {
  background: var(--bg);
  border-style: solid;
  color: var(--ink);
}

/* Discord Style Context Menu */
.discord-menu {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(20,30,28,0.15);
  padding: 6px;
  min-width: 190px;
  z-index: 10000;
}
.discord-menu-title {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 8px 4px;
  letter-spacing: 0.05em;
}
.discord-menu-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  font-size: 13px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.1s;
}
.discord-menu-item:hover {
  background: var(--bg);
}
.discord-menu-check {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: bold;
  border: 1px solid var(--muted);
  border-radius: 3px;
  color: transparent;
}
.discord-menu-item.active .discord-menu-check {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
}
.discord-menu-color {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.card-head{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.card-title{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:600;
  margin:0;
  flex:1;
  min-width:160px;
  padding:3px 7px;
  margin-left:-7px;
  border-radius:6px;
  outline:none;
}

.progress-pill{
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:500;
  background:var(--teal-soft);
  color:var(--teal);
  padding:5px 12px;
  border-radius:999px;
  white-space:nowrap;
}
.progress-pill.amber{ background:var(--amber-soft); color:#9C6E1F; }

.icon-btn{
  border:none;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  font-size:16px;
  line-height:1;
  padding:5px;
  border-radius:6px;
  display:flex;
  align-items:center;
}
.icon-btn:hover{ color:var(--red); background:#FBEAE8; }

/* Shopping list */
.shopping-sections{ display:flex; flex-direction:column; gap:16px; }

/* Labels manager */
.labels-title{
  font-family:var(--font-display);
  font-size:14px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--muted);
  margin-bottom:12px;
}
.labels-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.label-chip{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--bg);
  border-radius:999px;
  padding:5px 6px 5px 12px;
  border-left:4px solid var(--l0);
}
.label-name{
  font-family:var(--font-body);
  font-size:13px;
  font-weight:600;
  outline:none;
  padding:2px 5px;
  border-radius:4px;
}
.label-name:focus{ background:#fff; }
.chip-del{
  border:none; background:transparent; color:var(--muted); cursor:pointer;
  font-size:13px; padding:4px 7px; border-radius:50%;
}
.chip-del:hover{ color:var(--red); background:#FBEAE8; }
.add-label-btn{
  border:1.5px dashed var(--line);
  background:transparent;
  color:var(--muted);
  font-family:var(--font-body);
  font-weight:600;
  font-size:13px;
  padding:8px 16px;
  border-radius:999px;
  cursor:pointer;
  transition:border-color .15s, color .1
